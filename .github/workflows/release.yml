name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          ldflags="-s -w -X github.com/Kavun-Sama/jazztun/internal/buildinfo.Version=${GITHUB_REF_NAME}"

          build() {
            local goos="$1"
            local goarch="$2"
            local suffix="$3"
            local ext="$4"

            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="$ldflags" -o "dist/jazztun-client-${suffix}${ext}" ./cmd/client
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="$ldflags" -o "dist/jazztun-server-${suffix}${ext}" ./cmd/server
          }

          build linux amd64 linux-amd64 ""
          build linux arm64 linux-arm64 ""
          build windows amd64 windows-amd64 ".exe"
          build darwin arm64 darwin-arm64 ""

          (
            cd dist
            sha256sum jazztun-* > checksums.txt
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  release-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jazztun-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          target: runtime
          push: true
          provenance: false
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
